# Bun Configuration - Optimized Multi-Core Pipeline
[install]
cache = true

[test]
preload = ["./src/core/__tests__/__mocks__/bunSetup.ts"]
isolate = true
parallel = true 
smol = false
coverage = true
timeout = 5000
# randomize = true # Currently turned off to pass the tests
[run]
bun = true
shell = "bun"
logLevel = "warn"
telemetry = false
noOrphans = true
linker = "isolated"
peer = true
