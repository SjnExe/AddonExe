name: Build

on:
    push:
        tags:
            - 'v*'
        branches:
            - main
    workflow_dispatch:
    pull_request:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    update-lockfile:
        runs-on: ubuntu-latest
        if: github.actor == 'dependabot[bot]'
        timeout-minutes: 5
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: bun install
            - uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: 'chore(deps): update bun.lock'
                  file_pattern: 'bun.lock'

    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            NODE_OPTIONS: '--max-old-space-size=16384'
            MAKEFLAGS: '-j4'
        steps:
            - uses: actions/checkout@v7
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: ${{ github.actor == 'dependabot[bot]' && 'bun install' || 'bun install --frozen-lockfile' }}
            - run: bun run lint

    format:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            NODE_OPTIONS: '--max-old-space-size=16384'
            MAKEFLAGS: '-j4'
        steps:
            - uses: actions/checkout@v7
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: ${{ github.actor == 'dependabot[bot]' && 'bun install' || 'bun install --frozen-lockfile' }}
            - run: bun run format:check

    typecheck:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            NODE_OPTIONS: '--max-old-space-size=16384'
            MAKEFLAGS: '-j4'
        steps:
            - uses: actions/checkout@v7
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: ${{ github.actor == 'dependabot[bot]' && 'bun install' || 'bun install --frozen-lockfile' }}
            - name: Cache TypeScript Build Info
              uses: actions/cache@v6
              with:
                  path: tsconfig.tsbuildinfo
                  key: ${{ runner.os }}-tsbuildinfo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-tsbuildinfo-
            - run: bun run check-types

    test:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            NODE_OPTIONS: '--max-old-space-size=16384'
            MAKEFLAGS: '-j4'
        steps:
            - uses: actions/checkout@v7
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: ${{ github.actor == 'dependabot[bot]' && 'bun install' || 'bun install --frozen-lockfile' }}
            - run: bun run test

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            NODE_OPTIONS: '--max-old-space-size=16384'
            MAKEFLAGS: '-j4'
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - name: Install dependencies
              run: |
                  ${{ github.actor == 'dependabot[bot]' && 'bun install' || 'bun install --frozen-lockfile' }}

            - name: Determine Build Type
              id: build_type
              run: |
                  if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
                      echo "type=stable" >> $GITHUB_OUTPUT
                  else
                      echo "type=nightly" >> $GITHUB_OUTPUT
                  fi

            - name: Generate Dev Version (Nightly only)
              if: steps.build_type.outputs.type == 'nightly'
              shell: bash
              run: |
                  set -e
                  # Read base version from package.json (e.g., 0.7.0)
                  BASE_VER=$(bun -e "console.log(require('./package.json').version)")

                  MAJOR=$(echo $BASE_VER | cut -d. -f1)
                  MINOR=$(echo $BASE_VER | cut -d. -f2)
                  PATCH=${{ github.run_number }}

                  VERSION_STR="${MAJOR}.${MINOR}.${PATCH}"
                  VERSION_ARR_STR="[${MAJOR}, ${MINOR}, ${PATCH}]"

                  # Treat all dev builds as Beta/Debug builds
                  IS_BETA="true"

                  echo "IS_BETA_RELEASE=$IS_BETA" >> $GITHUB_ENV
                  echo "VERSION_STRING=$VERSION_STR" >> $GITHUB_ENV
                  echo "VERSION_ARRAY_STRING=$VERSION_ARR_STR" >> $GITHUB_ENV

                  # Generate Date
                  BUILD_DATE=$(date -u)
                  echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

            - name: Prepare Release Source (Nightly only)
              if: steps.build_type.outputs.type == 'nightly'
              shell: bash
              env:
                  VERSION_STRING: ${{ env.VERSION_STRING }}
                  VERSION_ARRAY_STRING: ${{ env.VERSION_ARRAY_STRING }}
                  IS_BETA_RELEASE: ${{ env.IS_BETA_RELEASE }}
              run: |
                  set -e
                  bun scripts/prepare-release.js

            - name: Build TypeScript (Nightly)
              if: steps.build_type.outputs.type == 'nightly'
              run: |
                  bun run clean
                  bun scripts/generate-manifests.js --nightly --build-number ${{ github.run_number }}
                  bun scripts/build-assets.js
                  bunx tsup

            - name: Build TypeScript (Stable)
              if: steps.build_type.outputs.type == 'stable'
              run: |
                  bun run build:release

            - name: Set Version Variable for Archive Names
              run: |
                  if [[ "${{ steps.build_type.outputs.type }}" == "stable" ]]; then
                      echo "ARCHIVE_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
                      echo "PREFIX=Release" >> $GITHUB_ENV
                  else
                      echo "ARCHIVE_VERSION=${{ env.VERSION_STRING }}" >> $GITHUB_ENV
                      echo "PREFIX=Nightly" >> $GITHUB_ENV
                  fi

            - name: Create staging directory and copy addon folders
              run: |
                  set -e
                  mkdir staging
                  cp -r build/behavior staging/
                  cp -r build/resource staging/

            - name: Create Release Archives
              shell: bash
              run: |
                  set -e
                  # Create main .mcaddon with max compression (Exclude maps)
                  (cd staging && zip -r -9 "../AddonExe.${PREFIX}.${ARCHIVE_VERSION}.mcaddon" ./* -x "*.map")

                  # Create BP .mcpack with max compression (Exclude maps)
                  (cd staging/behavior && zip -r -9 "../../AddonExe_BP.${PREFIX}.${ARCHIVE_VERSION}.mcpack" ./* -x "*.map")

                  # Create RP .mcpack with max compression (Exclude maps)
                  (cd staging/resource && zip -r -9 "../../AddonExe_RP.${PREFIX}.${ARCHIVE_VERSION}.mcpack" ./* -x "*.map")

            - name: Upload Raw Build Directory
              uses: actions/upload-artifact@v7
              with:
                  name: build-dir
                  path: build/
                  retention-days: 1

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: release-archives
                  path: |
                      AddonExe.${{ env.PREFIX }}.${{ env.ARCHIVE_VERSION }}.mcaddon
                      AddonExe_BP.${{ env.PREFIX }}.${{ env.ARCHIVE_VERSION }}.mcpack
                      AddonExe_RP.${{ env.PREFIX }}.${{ env.ARCHIVE_VERSION }}.mcpack
                  retention-days: 7

            - name: Upload Debug Symbols (Nightly only)
              if: steps.build_type.outputs.type == 'nightly'
              uses: actions/upload-artifact@v7
              with:
                  name: debug-symbols-nightly
                  path: staging/**/*.map
                  retention-days: 7
            - name: Create build meta file
              run: |
                  echo "BUILD_TYPE=${{ steps.build_type.outputs.type }}" > build_meta.env
                  echo "ARCHIVE_VERSION=${{ env.ARCHIVE_VERSION }}" >> build_meta.env
                  echo "VERSION_STRING=${{ env.VERSION_STRING }}" >> build_meta.env
                  echo "BUILD_DATE=${{ env.BUILD_DATE }}" >> build_meta.env
                  echo "PREFIX=${{ env.PREFIX }}" >> build_meta.env
            - name: Upload build meta
              uses: actions/upload-artifact@v7
              with:
                  name: build-meta
                  path: build_meta.env
                  retention-days: 7
            - name: Validate build
              run: bun run validate

    release:
        needs: [build, lint, format, typecheck, test]
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Download Build Meta
              uses: actions/download-artifact@v8
              with:
                  name: build-meta

            - name: Download Release Archives
              uses: actions/download-artifact@v8
              with:
                  name: release-archives

            - name: Load Build Meta
              run: |
                  cat build_meta.env >> $GITHUB_ENV

            - name: Clean Old Nightly Assets
              if: env.BUILD_TYPE == 'nightly'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release delete nightly --cleanup-tag --yes || true

            - name: Publish Nightly Release
              if: env.BUILD_TYPE == 'nightly'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Create note text
                  cat <<EOF > release_notes.md
                  **Latest Nightly Build**
                  Version: \`${{ env.VERSION_STRING }}\`
                  Commit: \`${{ github.sha }}\`
                  Date: \`${{ env.BUILD_DATE }}\`

                  *This is an automated development build. It may contain bugs.*
                  EOF

                  # Use gh release create
                  gh release create nightly \
                      --title "Nightly Build (Latest Dev)" \
                      --prerelease \
                      --notes-file release_notes.md \
                      AddonExe.Nightly.${{ env.ARCHIVE_VERSION }}.mcaddon \
                      AddonExe_BP.Nightly.${{ env.ARCHIVE_VERSION }}.mcpack \
                      AddonExe_RP.Nightly.${{ env.ARCHIVE_VERSION }}.mcpack

            - name: Publish Stable Release
              if: env.BUILD_TYPE == 'stable'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Use gh release create
                  gh release create ${{ env.ARCHIVE_VERSION }} \
                      --generate-notes \
                      AddonExe.Release.${{ env.ARCHIVE_VERSION }}.mcaddon \
                      AddonExe_BP.Release.${{ env.ARCHIVE_VERSION }}.mcpack \
                      AddonExe_RP.Release.${{ env.ARCHIVE_VERSION }}.mcpack

    analyze:
        name: Analyze
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: javascript-typescript
                  config: |
                      paths-ignore:
                          - '**/__tests__/**'
                          - '**/__mocks__/**'
                          - 'scripts/**'
                          - '*.config.*'

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v4
              with:
                  category: '/language:javascript-typescript'
                  ram: 14579 # Matches the ram in the job log to fully utilize GitHub Action runners
                  threads: 4 # Also matches threads
