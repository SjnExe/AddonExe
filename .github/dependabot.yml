version: 2
updates:
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'daily'
      labels:
          - 'dependencies'
          - 'actions'
      groups:
          all-actions:
              patterns:
                  - '*'
    - package-ecosystem: 'bun'
      directory: '/'
      schedule:
          interval: 'daily'
      labels:
          - 'dependencies'
